services:
  collector:
    build: .
    environment:
      DB_PATH: /data/jobs.db
      TG_SESSION_NAME: /data/jobs_collector
    volumes:
      - ./data:/data
    restart: unless-stopped

  # HTTP API для бота: http://<IP_сервера>:8011/parse_post
  api:
    build: .
    command:
      ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8011"]
    ports:
      - "8011:8011"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Ollama на хосте (вне контейнера): оставьте по умолчанию или задайте в .env.
      # Свой сервис Ollama в этом же compose: OLLAMA_BASE_URL=http://имя_сервиса:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
