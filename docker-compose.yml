services:
  # HTTP API для бота: http://<IP_сервера>:8011/parse_post
  api:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
    ports:
      - "8011:8011"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Ollama на хосте (вне контейнера): задайте при необходимости.
      # Свой сервис Ollama в этом же compose: OLLAMA_BASE_URL=http://имя_сервиса:11434
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    restart: unless-stopped
