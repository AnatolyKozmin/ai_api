services:
  api:
    build: .
    ports:
      - "8011:8011"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://172.17.0.1:11434}
      GOOGLE_SPREADSHEET_ID: ${GOOGLE_SPREADSHEET_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    restart: unless-stopped
